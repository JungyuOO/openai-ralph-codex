version: 1

runner:
  type: codex-cli
  command: codex

project:
  language: en
  prd_path: .ralph/prd.md
  tasks_path: .ralph/tasks.json
  state_path: .ralph/state.json
  progress_path: .ralph/progress.md

context:
  max_estimated_load: 0.65
  split_if_files_over: 8
  split_if_cross_layer: true

verification:
  commands:
    - npm run lint
    - npm run typecheck
    - npm test
  strict: false

recovery:
  max_retries_per_task: 2
  retry_with_fresh_context: true
  split_on_repeated_failure: true
  replan_on_blocked: true
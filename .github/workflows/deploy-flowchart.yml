name: Deploy Flowchart to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workflow/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: workflow

      - name: Lint
        run: npm run lint
        working-directory: workflow

      - name: Build
        run: npm run build
        working-directory: workflow

      - name: Publish dist to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          DEPLOY_DIR="$(mktemp -d)"
          cp -R workflow/dist/. "$DEPLOY_DIR/"
          touch "$DEPLOY_DIR/.nojekyll"

          cd "$DEPLOY_DIR"
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "deploy: update flowchart site"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"
          git push --force origin gh-pages

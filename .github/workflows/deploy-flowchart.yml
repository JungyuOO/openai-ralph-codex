name: Deploy Flowchart to Main Root

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flowchart-main-root
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workflow/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: workflow

      - name: Lint
        run: npm run lint
        working-directory: workflow

      - name: Build
        run: npm run build
        working-directory: workflow

      - name: Publish flowchart into repository root
        run: |
          set -euo pipefail

          rm -rf assets
          cp -R workflow/dist/. .
          touch .nojekyll

          if git diff --quiet -- index.html assets .nojekyll; then
            echo "No root site changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          git commit -m "deploy: update flowchart site"
          git push

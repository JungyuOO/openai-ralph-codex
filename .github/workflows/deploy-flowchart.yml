name: Deploy Flowchart to Main Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/index.html'
      - 'docs/flowchart/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flowchart-main-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workflow/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: workflow

      - name: Lint
        run: npm run lint
        working-directory: workflow

      - name: Build
        run: npm run build
        working-directory: workflow

      - name: Publish flowchart into docs
        run: |
          set -euo pipefail

          rm -rf docs/flowchart
          mkdir -p docs/flowchart
          cp -R workflow/dist/. docs/flowchart/

          cat > docs/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=./flowchart/" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>OpenAI Ralph Codex Flowchart</title>
            </head>
            <body>
              <p>Redirecting to <a href="./flowchart/">the Ralph flowchart</a>…</p>
            </body>
          </html>
          EOF

          if git diff --quiet -- docs/index.html docs/flowchart; then
            echo "No docs changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/flowchart
          git commit -m "deploy: update flowchart site"
          git push
